name: Security CI

on:
  push:
    branches:
      - main
      - develop
      - feature/**
      - hotfix/**
  pull_request:
    branches:
      - main
      - develop

permissions:
  contents: read

concurrency:
  group: security-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate-repo:
    name: Validate Repository
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Check forbidden files
        run: |
          echo "Verificando arquivos sensiveis versionados..."

          forbidden_files=$(find . \
            \( -name ".env" -o -name ".env.local" -o -name "*.sqlite" -o -name "*.sqlite3" -o -name "*.db" -o -name "*.key" -o -name "*-key.pem" -o -name "*.p12" -o -name "*.pfx" \) \
            -not -path "./node_modules/*" \
            -not -path "./.git/*")

          if [ -n "$forbidden_files" ]; then
            echo "Arquivos proibidos encontrados no repositorio:"
            echo "$forbidden_files"
            exit 1
          fi

      - name: Check for obvious hardcoded secrets
        run: |
          echo "Verificando padroes comuns de segredo hardcoded..."

          secret_literal_pattern="(JWT_SECRET|jwt_secret|SECRET_KEY|API_KEY|ACCESS_TOKEN|REFRESH_TOKEN)[[:space:]]*[:=][[:space:]]*['\"][^'\"]{8,}['\"]"
          private_key_pattern="-----BEGIN (RSA |EC )?PRIVATE KEY-----"


          if grep -RInE "$secret_literal_pattern" . \
            --exclude-dir=node_modules \
            --exclude-dir=.git \
            --exclude-dir=dist \
            --exclude="*.example" \
            --exclude="*.md" \
            --exclude="*.yml" \
            --exclude="*.yaml"; then
            echo "Possivel segredo hardcoded encontrado. Revise o resultado acima."
            exit 1
          fi

          if grep -RInE --binary-files=without-match "$private_key_pattern" . \
            --exclude-dir=node_modules \
            --exclude-dir=.git \
            --exclude-dir=dist; then
            echo "Material de chave privada encontrado no repositorio. Remova e rotacione a chave comprometida."
            exit 1
          fi

  install-and-quality:
    name: Install / Lint / Typecheck
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run lint
        run: npm run lint

      - name: Run typecheck
        run: npm run typecheck

  dependency-audit:
    name: Dependency Audit
    runs-on: ubuntu-latest
    needs: install-and-quality

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Audit dependencies
        run: npm audit --audit-level=high

  test-api:
    name: API Tests
    runs-on: ubuntu-latest
    needs: install-and-quality

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run API tests
        run: npm run test:api

  test-web:
    name: Web Tests
    runs-on: ubuntu-latest
    needs: install-and-quality

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run Web tests
        run: npm run test:web

# OBS: validacao de credenciais padrao de admin desativada temporariamente
# enquanto o sistema estiver em fase de testes.
