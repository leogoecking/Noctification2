findings:
  - bug_id: SEC-AUTH-001
    severity: high
    priority: 1
    category: security
    component: API auth
    status: fixed
    complexity: medium
    files:
      - apps/api/src/routes/auth.ts
      - apps/api/src/test/api.test.ts
    current_behavior: Unlimited invalid login attempts were accepted.
    expected_behavior: Repeated invalid login attempts should trigger temporary lockout.
    root_cause: Missing login throttling/lockout control in /auth/login route.
    reproduction_steps:
      - Call POST /api/v1/auth/login with valid login and invalid password repeatedly.
      - Observe repeated 401 without lockout before fix.
    verification:
      - API test bloqueia login apos muitas tentativas invalidas passes.
      - Next invalid attempt after threshold returns 429 and Retry-After.

  - bug_id: BUG-API-001
    severity: high
    priority: 1
    category: functional
    component: Admin notification history API
    status: fixed
    complexity: medium
    files:
      - apps/api/src/routes/admin.ts
      - apps/api/src/test/api.test.ts
    current_behavior: Unread/read status filtering was applied after LIMIT 200.
    expected_behavior: Status filtering should happen before LIMIT.
    root_cause: Filtering logic executed in memory on already-limited result set.
    reproduction_steps:
      - Seed 205 notifications where oldest 5 are unread and newest 200 are resolved.
      - Call GET /api/v1/admin/notifications?status=unread.
      - Before fix, endpoint returns zero unread records.
    verification:
      - API test nao perde notificacoes nao lidas antigas ao filtrar status unread passes.
      - status query validation returns 400 for invalid status.

  - bug_id: SEC-DEP-001
    severity: low
    priority: 3
    category: dependency-security
    component: API dependency graph
    status: fixed
    complexity: low
    files:
      - apps/api/package.json
      - package-lock.json
    current_behavior: cookie@^0.6.0 matched advisory GHSA-pxg6-pf52-xh8x.
    expected_behavior: Use patched dependency version.
    root_cause: Outdated direct dependency pin.
    reproduction_steps:
      - Run npm audit --json before update.
      - Observe cookie vulnerability.
    verification:
      - Updated to cookie@^1.1.1.
      - npm audit --json returns zero vulnerabilities.

  - bug_id: QA-WEB-001
    severity: medium
    priority: 2
    category: quality
    component: Web test coverage
    status: open
    complexity: medium
    files:
      - apps/web
    current_behavior: Frontend workspace has no test files.
    expected_behavior: Core frontend flows should have automated tests.
    root_cause: No web test suite implementation.
    reproduction_steps:
      - Run npm run test:web.
      - Observe output No test files found.
    verification:
      - Pending remediation with frontend tests and CI enforcement.
